name: Tracker run

on:
  schedule:
    - cron: "0 13 * * *"   # daily 13:00 UTC (~7am MT): ingest; Mondays also dedupe
  workflow_dispatch:        # manual trigger from the Actions tab
    inputs:
      dedupe:
        description: "Also run dedupe after ingest"
        type: boolean
        default: false
      digest:
        description: "Also send the weekly email digest"
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Ingest past week into Raw Events
        run: python pipeline.py --days 7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
      - name: Check day of week
        id: day
        run: echo "dow=$(date -u +%u)" >> "$GITHUB_OUTPUT"
      - name: Dedupe into Events (Mondays, or manual opt-in)
        if: (github.event_name == 'schedule' && steps.day.outputs.dow == '1') || (github.event_name == 'workflow_dispatch' && inputs.dedupe)
        run: python dedupe.py --days 7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
      - name: Send weekly digest (Mondays, or manual opt-in)
        if: (github.event_name == 'schedule' && steps.day.outputs.dow == '1') || (github.event_name == 'workflow_dispatch' && inputs.digest)
        run: python digest.py --days 7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
